name: 'sparkd'

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  TEST:
    name: test the pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.26.4'


      - name: Print message
        run: echo "Pipeline is working"

      - name: list project files
        run: ls -la

      - name: Verify modules are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod

        #test the app
      - name: test app  
        run: go test ./...

  BUILD:
    name: install go and set up dependencies
    runs-on: ubuntu-latest
    needs: TEST
    steps:
      # set up go
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.26.4'

      - name: verify go is installed
        run: go version

      - name: build go binary
        run: go build -o main

  DEPLOY:
    name: deploy pipeline to VPS
    runs-on: ubuntu-latest
    needs: BUILD
    if: github.ref_name == 'main'
    steps:
      - name: Debug paths
        run: |
          which go
          go version
          ls -la
          ls ./cmd/ 2>/dev/null || echo "no cmd dir"
          cat go.mod | head -5
        
